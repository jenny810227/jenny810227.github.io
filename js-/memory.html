    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0F172A',
                        cardback: '#1E293B',
                        neonblue: '#38BDF8',
                        neonpurple: '#A855F7',
                        neongreen: '#4ADE80',

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', 'Rajdhani', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            overflow-x: hidden;
        }

        /* Card 3D Flip Effects */
        .game-container {
            perspective: 1000px;
        }

        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .card-front {
            transform: rotateY(180deg);
        }

        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Card Match Animations */
        @keyframes pulse-success {
            0%, 100% { transform: rotateY(180deg) scale(1); filter: brightness(1); }
            50% { transform: rotateY(180deg) scale(1.08); filter: brightness(1.3) drop-shadow(0 0 15px rgba(74, 222, 128, 0.6)); }
        }

        @keyframes shake-fail {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20%, 60% { transform: rotateY(180deg) translateX(-6px); }
            40%, 80% { transform: rotateY(180deg) translateX(6px); }
        }

        .match-success {
            animation: pulse-success 0.5s ease-in-out;
        }

        .match-fail {
            animation: shake-fail 0.4s ease-in-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.7);
        }
    </style>
</head>

    <script>
        // --- 1. Sound Engine (Web Audio API) ---
        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.enabled = true;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            toggle(state) {
                this.enabled = state !== undefined ? state : !this.enabled;
                return this.enabled;
            }

            playFlip() {
                if (!this.enabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.1);
            }

            playMatch() {
                if (!this.enabled) return;
                this.init();
                const now = this.ctx.currentTime;
                
                // Play a bright major chord
                const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
                notes.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.05);
                    
                    gain.gain.setValueAtTime(0.1, now + index * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.05 + 0.3);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.05);
                    osc.stop(now + index * 0.05 + 0.3);
                });
            }

            playMismatch() {
                if (!this.enabled) return;
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.setValueAtTime(120, now + 0.08);
                
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.25);
            }

            playWin() {
                if (!this.enabled) return;
                this.init();
                const now = this.ctx.currentTime;
                // Elegant ascending pattern
                const melody = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C4 to C6
                melody.forEach((freq, index) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + index * 0.08);
                    
                    gain.gain.setValueAtTime(0.12, now + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.4);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + index * 0.08);
                    osc.stop(now + index * 0.08 + 0.4);
                });
            }
        }
        const sound = new SoundEngine();

        // --- 2. Particles / Confetti System ---
        class ConfettiSystem {
            constructor() {
                this.canvas = document.getElementById('confetti-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.active = false;
                this.colors = ['#FFC107', '#E91E63', '#00BCD4', '#8BC34A', '#9C27B0', '#03A9F4'];
                
                window.addEventListener('resize', () => this.resize());
                this.resize();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            spawn() {
                this.particles = [];
                for (let i = 0; i < 150; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height - this.canvas.height,
                        size: Math.random() * 8 + 4,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        speedX: Math.random() * 4 - 2,
                        speedY: Math.random() * 5 + 3,
                        rotation: Math.random() * 360,
                        rotationSpeed: Math.random() * 4 - 2
                    });
                }
            }

            start() {
                this.spawn();
                if (!this.active) {
                    this.active = true;
                    this.tick();
                }
            }

            stop() {
                this.active = false;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            tick() {
                if (!this.active) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                let alive = false;
                this.particles.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;
                    
                    if (p.y < this.canvas.height) {
                        alive = true;
                        this.ctx.save();
                        this.ctx.translate(p.x, p.y);
                        this.ctx.rotate(p.rotation * Math.PI / 180);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                        this.ctx.restore();
                    }
                });

                if (alive) {
                    requestAnimationFrame(() => this.tick());
                } else {
                    this.active = false;
                }
            }
        }
        const confetti = new ConfettiSystem();

        // --- 3. Themes Repository ---
        const THEMES = {
            space: {
                icons: ['🚀', '🛸', '🛰️', '🪐', '🌟', '☄️', '🌙', '☀️', '💻', '📱', '⌚', '📷', '🎮', '🎧', '🕶️', '💡', '🔋', '🔌', '⚙️', '🧪', '🧬', '🔭', '📡', '🔮', '🗺️', '🧭', '⌛', '⏳', '🖨️', '💿', '📼', '👾'],
                bgClass: 'from-cyan-500/20 to-blue-500/20 border-cyan-500/30'
            },
            animals: {
                icons: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐦', '🐤', '🦅', '🦉', '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞', '🦀'],
                bgClass: 'from-emerald-500/20 to-teal-500/20 border-emerald-500/30'
            },
            foods: {
                icons: ['🍎', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓', '🍒', '🍍', '🥥', '🥝', '🍅', '🍆', '🥑', '🥦', '🌽', '🥕', '🍞', '🧀', '🥚', '🍳', '🥞', '🥓', '🍔', '🍟', '🍕', '🌭', '🌮', '🍿', '🧁', '🍩', '🍪'],
                bgClass: 'from-amber-500/20 to-orange-500/20 border-amber-500/30'
            },
            sports: {
                icons: ['⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🎱', '🏓', '走', '🏹', '🥊', '🛹', '🚲', '🏆', '🎖️', '🧗', '🚣', '🏊', '🚴', '🏋️', '🤸', '🏂', '🏎️', '🎮', '🎳', '🎯', '🪁', '🎪', '🎨', '🎺'],
                bgClass: 'from-rose-500/20 to-pink-500/20 border-rose-500/30'
            }
        };

        // --- 4. Game State Management ---
        const GAME = {
            gridSize: 4, // default 4x4
            theme: 'space',
            cards: [],
            flippedCards: [],
            moves: 0,
            matchesCount: 0,
            startTime: null,
            timerInterval: null,
            elapsedTime: 0,
            isPlaying: false,
            bestRecords: {
                '4': null, // Easy
                '6': null, // Medium
                '8': null  // Hard
            }
        };

        // Initialize Highscores from localStorage
        function loadHighscores() {
            const saved = localStorage.getItem('mind_quest_highscores');
            if (saved) {
                try {
                    GAME.bestRecords = JSON.parse(saved);
                } catch(e) {
                    console.error("Failed to parse saved highscores", e);
                }
            }
            renderHighscores();
        }

        function saveHighScore(grid, seconds, moves) {
            const currentBest = GAME.bestRecords[grid];
            let isNewBest = false;
            
            // Criteria: Less moves first, then less time
            if (!currentBest || moves < currentBest.moves || (moves === currentBest.moves && seconds < currentBest.seconds)) {
                GAME.bestRecords[grid] = { seconds, moves, date: new Date().toLocaleDateString() };
                localStorage.setItem('mind_quest_highscores', JSON.stringify(GAME.bestRecords));
                isNewBest = true;
            }
            renderHighscores();
            return isNewBest;
        }

        function renderHighscores() {
            const container = document.getElementById('highscores-container');
            const diffLabels = {
                '4': { title: '簡單 (4x4)', color: 'text-purple-400' },
                '6': { title: '中等 (6x6)', color: 'text-sky-400' },
                '8': { title: '困難 (8x8)', color: 'text-pink-400' }
            };

            container.innerHTML = '';
            
            Object.keys(diffLabels).forEach(grid => {
                const record = GAME.bestRecords[grid];
                const labelInfo = diffLabels[grid];
                
                const wrapper = document.createElement('div');
                wrapper.className = "flex justify-between items-center bg-slate-800/40 p-3 rounded-xl border border-slate-700/50 text-xs";
                
                if (record) {
                    const formattedTime = formatTime(record.seconds);
                    wrapper.innerHTML = `
                        <div>
                            <span class="font-bold ${labelInfo.color}">${labelInfo.title}</span>
                            <span class="block text-slate-500 mt-0.5">達成日期: ${record.date}</span>
                        </div>
                        <div class="text-right font-mono">
                            <div class="text-slate-200 font-bold">${record.moves} 步</div>
                            <div class="text-slate-400">${formattedTime}</div>
                        </div>
                    `;
                } else {
                    wrapper.innerHTML = `
                        <div>
                            <span class="font-bold ${labelInfo.color}">${labelInfo.title}</span>
                            <span class="block text-slate-500 mt-0.5">尚未挑戰</span>
                        </div>
                        <div class="text-right text-slate-500 italic">
                            暫無紀錄
                        </div>
                    `;
                }
                container.appendChild(wrapper);
            });
        }

        // --- 5. Game Core Mechanics ---

        function initGameBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            // Adjust CSS grid column dynamic class
            // Tailwind doesn't compile dynamic grid columns smoothly via string templating,
            // so we inject inline style or swap built-in classes safely.
            const gridCols = GAME.gridSize;
            board.style.gridTemplateColumns = `repeat(${gridCols}, minmax(0, 1fr))`;

            // Prepare card deck
            const totalCards = gridCols * gridCols;
            const pairsCount = totalCards / 2;
            
            // Pick a slice of icons from the active theme and double it
            const themeData = THEMES[GAME.theme];
            const selectedIcons = themeData.icons.slice(0, pairsCount);
            const deck = [...selectedIcons, ...selectedIcons];
            
            // Shuffle
            shuffle(deck);

            GAME.cards = deck.map((icon, index) => ({
                id: index,
                val: icon,
                flipped: false,
                matched: false
            }));

            GAME.flippedCards = [];
            GAME.moves = 0;
            GAME.matchesCount = 0;
            GAME.elapsedTime = 0;
            GAME.isPlaying = false;
            
            clearInterval(GAME.timerInterval);
            GAME.timerInterval = null;

            updateStatsDisplay();

            // Construct Cards
            GAME.cards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = 'card relative cursor-pointer w-full h-full aspect-square group';
                cardEl.dataset.id = card.id;

                // Inner wrapper for 3D flip effect
                const inner = document.createElement('div');
                inner.className = 'card-inner w-full h-full relative duration-500 shadow-lg rounded-xl sm:rounded-2xl border border-slate-700/60';

                // Back side of card (faced down)
                const back = document.createElement('div');
                back.className = 'card-back absolute inset-0 w-full h-full rounded-xl sm:rounded-2xl bg-slate-800 flex items-center justify-center text-slate-500 font-extrabold text-lg sm:text-2xl border-2 border-slate-700 group-hover:border-purple-500/60 group-hover:bg-slate-750 transition-all';
                back.innerHTML = `
                    <div class="relative w-full h-full flex items-center justify-center">
                        <span class="opacity-15 group-hover:scale-110 transition duration-300">🧠</span>
                        <!-- Corner decorations -->
                        <div class="absolute top-2 left-2 w-2 h-2 border-t-2 border-l-2 border-slate-600 rounded-tl group-hover:border-purple-400"></div>
                        <div class="absolute top-2 right-2 w-2 h-2 border-t-2 border-r-2 border-slate-600 rounded-tr group-hover:border-purple-400"></div>
                        <div class="absolute bottom-2 left-2 w-2 h-2 border-b-2 border-l-2 border-slate-600 rounded-bl group-hover:border-purple-400"></div>
                        <div class="absolute bottom-2 right-2 w-2 h-2 border-b-2 border-r-2 border-slate-600 rounded-br group-hover:border-purple-400"></div>
                    </div>
                `;

                // Front side of card (revealed icon)
                const front = document.createElement('div');
                front.className = `card-front absolute inset-0 w-full h-full rounded-xl sm:rounded-2xl bg-gradient-to-br ${themeData.bgClass} border-2 border-slate-600 flex items-center justify-center`;
                
                // Scale text size based on grid size
                let textSize = 'text-3xl sm:text-4xl md:text-5xl';
                if (GAME.gridSize === 6) textSize = 'text-2xl sm:text-3xl md:text-4xl';
                if (GAME.gridSize === 8) textSize = 'text-lg sm:text-xl md:text-2xl';
                
                front.innerHTML = `<span class="${textSize} filter drop-shadow-md select-none">${card.val}</span>`;

                inner.appendChild(back);
                inner.appendChild(front);
                cardEl.appendChild(inner);

                // Touch & Click handler
                cardEl.addEventListener('click', () => handleCardClick(card.id, cardEl));
                
                board.appendChild(cardEl);
            });
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- 6. Interactivity & Card States ---

        function handleCardClick(id, element) {
            const card = GAME.cards[id];

            // Ignore if card already flipped, matched, or if two cards are currently checking
            if (card.flipped || card.matched || GAME.flippedCards.length >= 2) return;

            // Initialize sound and timer on first click
            sound.init();
            if (!GAME.isPlaying) {
                GAME.isPlaying = true;
                GAME.startTime = Date.now();
                GAME.timerInterval = setInterval(updateTimer, 1000);
            }

            // Flip Card
            card.flipped = true;
            element.classList.add('flipped');
            sound.playFlip();

            GAME.flippedCards.push({ card, element });

            if (GAME.flippedCards.length === 2) {
                GAME.moves++;
                checkMatch();
            }
        }

        function checkMatch() {
            const [choice1, choice2] = GAME.flippedCards;

            if (choice1.card.val === choice2.card.val) {
                // Match Found!
                choice1.card.matched = true;
                choice2.card.matched = true;
                GAME.matchesCount++;

                setTimeout(() => {
                    choice1.element.querySelector('.card-front').classList.add('match-success');
                    choice2.element.querySelector('.card-front').classList.add('match-success');
                    sound.playMatch();
                    
                    updateStatsDisplay();
                    GAME.flippedCards = [];

                    // Check Win Condition
                    const totalPairs = (GAME.gridSize * GAME.gridSize) / 2;
                    if (GAME.matchesCount === totalPairs) {
                        handleVictory();
                    }
                }, 300);

            } else {
                // Not Match
                setTimeout(() => {
                    choice1.element.querySelector('.card-front').classList.add('match-fail');
                    choice2.element.querySelector('.card-front').classList.add('match-fail');
                    sound.playMismatch();
                }, 300);

                setTimeout(() => {
                    // Turn cards back
                    choice1.card.flipped = false;
                    choice2.card.flipped = false;
                    
                    choice1.element.classList.remove('flipped');
                    choice2.element.classList.remove('flipped');
                    
                    choice1.element.querySelector('.card-front').classList.remove('match-fail');
                    choice2.element.querySelector('.card-front').classList.remove('match-fail');

                    updateStatsDisplay();
                    GAME.flippedCards = [];
                }, 1000);
            }
        }

        // --- 7. Metrics & UI Display Update ---

        function updateTimer() {
            if (!GAME.isPlaying) return;
            GAME.elapsedTime = Math.floor((Date.now() - GAME.startTime) / 1000);
            document.getElementById('time-counter').innerText = formatTime(GAME.elapsedTime);
        }

        function formatTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateStatsDisplay() {
            // Moves
            document.getElementById('moves-counter').innerText = GAME.moves;
            
            // Matched pairs
            const totalPairs = (GAME.gridSize * GAME.gridSize) / 2;
            document.getElementById('matched-counter').innerText = `${GAME.matchesCount} / ${totalPairs}`;

            // Accuracy Rate = (Matched Pairs / Moves) * 100
            let accuracy = 100;
            if (GAME.moves > 0) {
                accuracy = Math.round((GAME.matchesCount / GAME.moves) * 100);
            }
            document.getElementById('accuracy-counter').innerText = `${accuracy}%`;
        }

        function handleVictory() {
            GAME.isPlaying = false;
            clearInterval(GAME.timerInterval);
            
            sound.playWin();
            confetti.start();

            // Store highscore
            const isNewBest = saveHighScore(GAME.gridSize, GAME.elapsedTime, GAME.moves);

            // Populate Modal
            document.getElementById('modal-time').innerText = formatTime(GAME.elapsedTime);
            document.getElementById('modal-moves').innerText = GAME.moves;
            
            let accuracy = 100;
            if (GAME.moves > 0) {
                accuracy = Math.round(((GAME.gridSize * GAME.gridSize / 2) / GAME.moves) * 100);
            }
            document.getElementById('modal-accuracy').innerText = `${accuracy}%`;
            document.getElementById('modal-diff').innerText = `${GAME.gridSize} × ${GAME.gridSize}`;

            // Record Banner
            const banner = document.getElementById('new-record-banner');
            if (isNewBest) {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }

            // Show Modal
            const modal = document.getElementById('win-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
                modal.querySelector('.transform').classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            const modal = document.getElementById('win-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.remove('scale-100');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                confetti.stop();
                initGameBoard();
            }, 300);
        }

        // --- 8. Event Listeners Setup ---

        document.getElementById('restart-btn').addEventListener('click', () => {
            initGameBoard();
        });

        document.getElementById('modal-close-btn').addEventListener('click', () => {
            closeModal();
        });

        // Theme Selection handler
        document.getElementById('theme-selector').addEventListener('click', (e) => {
            const btn = e.target.closest('.theme-btn');
            if (!btn) return;

            // Remove active style from all
            document.querySelectorAll('.theme-btn').forEach(b => {
                b.className = 'theme-btn py-2.5 px-3 rounded-xl border border-slate-700 bg-slate-800/40 hover:bg-slate-800 text-sm font-medium transition-all flex flex-col items-center justify-center gap-1 active:scale-95';
            });

            // Set active class style for the selected theme
            const theme = btn.dataset.theme;
            GAME.theme = theme;
            
            let activeColorClass = 'text-sky-400 border-sky-500/50 bg-sky-500/10';
            if (theme === 'animals') activeColorClass = 'text-emerald-400 border-emerald-500/50 bg-emerald-500/10';
            if (theme === 'foods') activeColorClass = 'text-amber-400 border-amber-500/50 bg-amber-500/10';
            if (theme === 'sports') activeColorClass = 'text-rose-400 border-rose-500/50 bg-rose-500/10';
            
            btn.className = `theme-btn py-2.5 px-3 rounded-xl border text-sm font-medium transition-all flex flex-col items-center justify-center gap-1 active:scale-95 ${activeColorClass}`;
            
            initGameBoard();
        });

        // Difficulty Selection handler
        document.getElementById('difficulty-selector').addEventListener('click', (e) => {
            const btn = e.target.closest('.diff-btn');
            if (!btn) return;

            document.querySelectorAll('.diff-btn').forEach(b => {
                b.className = 'diff-btn w-full py-2 px-4 rounded-xl border border-slate-700 bg-slate-800/40 hover:bg-slate-800 text-sm font-medium transition text-left flex justify-between items-center text-slate-300';
                b.querySelector('span:last-child').className = 'text-xs px-2 py-0.5 rounded bg-slate-800 text-slate-400 font-mono';
            });

            const grid = parseInt(btn.dataset.grid);
            GAME.gridSize = grid;

            let borderTheme = 'border-purple-500/50 bg-purple-500/10';
            let labelColor = 'text-purple-300';
            if (grid === 6) {
                borderTheme = 'border-sky-500/50 bg-sky-500/10';
                labelColor = 'text-sky-300';
            } else if (grid === 8) {
                borderTheme = 'border-pink-500/50 bg-pink-500/10';
                labelColor = 'text-pink-300';
            }

            btn.className = `diff-btn w-full py-2 px-4 rounded-xl border ${borderTheme} text-sm font-medium transition text-left flex justify-between items-center text-slate-200`;
            btn.querySelector('span:last-child').className = `text-xs px-2 py-0.5 rounded bg-slate-800 ${labelColor} font-mono`;

            initGameBoard();
        });

        // Sound Toggle
        document.getElementById('sound-btn').addEventListener('click', () => {
            const onIcon = document.getElementById('sound-on-icon');
            const offIcon = document.getElementById('sound-off-icon');
            const isEnabled = sound.toggle();

            if (isEnabled) {
                onIcon.classList.remove('hidden');
                offIcon.classList.add('hidden');
            } else {
                onIcon.classList.add('hidden');
                offIcon.classList.remove('hidden');
            }
        });

        // --- Run initialization on load ---
        window.onload = function() {
            loadHighscores();
            initGameBoard();
        }
    </script>
</body>
</html>
